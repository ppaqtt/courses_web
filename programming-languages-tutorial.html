    fib_list = []

#include <iostream>
#include <vector>
#include <algorithm>
using namespace std;

class VectorMath {
public:
    static vector<int> add(const vector<int>& a, const vector<int>& b) {
        vector<int> result(a.size());
        for (size_t i = 0; i < a.size(); i++) {
            result[i] = a[i] + b[i];
        }
        return result;
    }

    static int dotProduct(const vector<int>& a, const vector<int>& b) {
        int sum = 0;
        for (size_t i = 0; i < a.size(); i++) {
            sum += a[i] * b[i];
        }
        return sum;
    }
};

int main() {
    vector<int> v1 = {1, 2, 3};
    vector<int> v2 = {4, 5, 6};

    vector<int> sum = VectorMath::add(v1, v2);
    cout << "向量相加: ";
    for (int n : sum) cout << n << " ";
    cout << endl;

    int dot = VectorMath::dotProduct(v1, v2);
    cout << "点积: " << dot << endl;

    return 0;
}`,

package main

import (

type Fetcher interface {
    Fetch(url string) (body string, urls []string, err error)
}

type fakeFetcher map[string]*fakeResult

type fakeResult struct {
    body string
    urls []string
}

func (f fakeFetcher) Fetch(url string) (string, []string, error) {
    time.Sleep(50 * time.Millisecond)
    if res, ok := f[url]; ok {
        return res.body, res.urls, nil
    }
    return "", nil, fmt.Errorf("not found: %s", url)
}

type Crawler struct {
    visited map[string]bool
    mu      sync.Mutex
    wg      sync.WaitGroup
}

func (c *Crawler) Crawl(url string, depth int, fetcher Fetcher) {
    defer c.wg.Done()
    if depth <= 0 {
        return
    }

    c.mu.Lock()
    if c.visited[url] {
        c.mu.Unlock()
        return
    }
    c.visited[url] = true
    c.mu.Unlock()

    body, urls, err := fetcher.Fetch(url)
    if err != nil {
        fmt.Println(err)
        return
    }
    fmt.Printf("found: %s %q\\n", url, body)

    for _, u := range urls {
        c.wg.Add(1)
        go c.Crawl(u, depth-1, fetcher)
    }
}

func main() {
    c := &Crawler{visited: make(map[string]bool)}

import Foundation

struct Task: Identifiable {
    let id = UUID()
    var title: String
    var description: String
    var isCompleted: Bool = false
    var priority: Priority
    let createdAt: Date = Date()
    
    enum Priority: String, CaseIterable {
        case high = "高"
        case medium = "中"
        case low = "低"
    }
}

class TaskManager {
    private var tasks: [Task] = []
    
    func addTask(title: String, description: String, priority: Task.Priority = .medium) {
        let task = Task(title: title, description: description, priority: priority)
        tasks.append(task)
        print("✅ 已添加任务: \\(title)")
    }
    
    func completeTask(id: UUID) {
        if let index = tasks.firstIndex(where: { $0.id == id }) {
            tasks[index].isCompleted = true
            print("🎉 完成任务: \\(tasks[index].title)")
        }
    }
    
    func tasksByPriority(_ priority: Task.Priority) -> [Task] {
        return tasks.filter { $0.priority == priority }
    }
    
    var progress: Double {
        guard !tasks.isEmpty else { return 0 }
        let completed = tasks.filter { $0.isCompleted }.count
        return Double(completed) / Double(tasks.count)
    }
    
    func printSummary() {
        print("\\n📋 任务管理系统")
        print(String(repeating: "-", count: 30))
        print("总任务数: \\(tasks.count)")
        print("完成进度: \\(Int(progress * 100))%")
        print(String(repeating: "-", count: 30))
        
        for priority in Task.Priority.allCases {
            let count = tasksByPriority(priority).count
            print("\\(priority.rawValue)优先级: \\(count) 个")
        }
    }
}

#include <stdio.h>
#include <stdlib.h>
#include <string.h>

typedef struct Node {
    int data;
    struct Node* next;
} Node;

typedef struct {
    Node* head;
    int size;
} LinkedList;

void list_init(LinkedList* list) {
    list->head = NULL;
    list->size = 0;
}

void list_push(LinkedList* list, int data) {
    Node* node = (Node*)malloc(sizeof(Node));
    node->data = data;
    node->next = list->head;
    list->head = node;
    list->size++;
    printf("✅ 添加: %d\\n", data);
}

void list_print(const LinkedList* list) {
    Node* cur = list->head;
    printf("链表 (size=%d): ", list->size);
    while (cur != NULL) {
        printf("%d", cur->data);
        if (cur->next) printf(" -> ");
        cur = cur->next;
    }
    printf("\\n");
}

int list_sum(const LinkedList* list) {
    int total = 0;
    for (Node* cur = list->head; cur; cur = cur->next) {
        total += cur->data;
    }
    return total;
}

void list_free(LinkedList* list) {
    Node* cur = list->head;
    while (cur) {
        Node* next = cur->next;
        free(cur);
        cur = next;
    }
    list->head = NULL;
    list->size = 0;
}

int main() {
    LinkedList list;
    list_init(&list);
    list_push(&list, 10);
    list_push(&list, 20);
    list_push(&list, 30);
    list_print(&list);
    printf("总和: %d\\n", list_sum(&list));
    list_free(&list);
    return 0;
}`,

    cd "\${DEPLOY_DIR}"
    git pull origin main

    log "🔄 重启 \${APP_NAME} 服务..."
    systemctl restart "\${APP_NAME}"

        }

        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) {
                closePopup();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePopup();
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderLanguages(btn.dataset.filter);
            });
        });

        function animateNumber(el, target) {
            let current = 0;
            const increment = target / 30;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                el.textContent = Math.floor(current);
            }, 30);
        }

        renderLanguages();
        animateNumber(totalLangsEl, languages.length);
        updateProgressStats();

        // 切换语言
        function toggleLanguage() {
            const newLang = window.toggleLanguage ? window.toggleLanguage() : 'zh';
            document.querySelector('.lang-switcher').textContent = newLang === 'zh' ? '🌐 中文' : '🌐 English';
        }
    </script>
    <script src="tutorial-common.js"></script>
</body>
</html>
