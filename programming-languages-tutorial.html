#include <iostream>
#include <vector>
#include <algorithm>
using namespace std;

class VectorMath {
public:
    static vector<int> add(const vector<int>& a, const vector<int>& b) {
        vector<int> result(a.size());
        for (size_t i = 0; i < a.size(); i++) {
            result[i] = a[i] + b[i];
        }
        return result;
    }

    static int dotProduct(const vector<int>& a, const vector<int>& b) {
        int sum = 0;
        for (size_t i = 0; i < a.size(); i++) {
            sum += a[i] * b[i];
        }
        return sum;
    }
};

int main() {
    vector<int> v1 = {1, 2, 3};
    vector<int> v2 = {4, 5, 6};

    vector<int> sum = VectorMath::add(v1, v2);
    cout << "向量相加: ";
    for (int n : sum) cout << n << " ";
    cout << endl;

    int dot = VectorMath::dotProduct(v1, v2);
    cout << "点积: " << dot << endl;

    return 0;
}`,

package main

import (
    "fmt"
    "sync"
    "time"
)

type Fetcher interface {
    Fetch(url string) (body string, urls []string, err error)
}

type fakeFetcher map[string]*fakeResult

type fakeResult struct {
    body string
    urls []string
}

func (f fakeFetcher) Fetch(url string) (string, []string, error) {
    time.Sleep(50 * time.Millisecond)
    if res, ok := f[url]; ok {
        return res.body, res.urls, nil
    }
    return "", nil, fmt.Errorf("not found: %s", url)
}

type Crawler struct {
    visited map[string]bool
    mu      sync.Mutex
    wg      sync.WaitGroup
}

func (c *Crawler) Crawl(url string, depth int, fetcher Fetcher) {
    defer c.wg.Done()
    if depth <= 0 {
        return
    }

    c.mu.Lock()
    if c.visited[url] {
        c.mu.Unlock()
        return
    }
    c.visited[url] = true
    c.mu.Unlock()

    body, urls, err := fetcher.Fetch(url)
    if err != nil {
        fmt.Println(err)
        return
    }

import Foundation

    }

    private var tasks: [Task] = []
    
    func addTask(title: String, description: String, priority: Task.Priority = .medium) {
        let task = Task(title: title, description: description, priority: priority)
        tasks.append(task)
        print("✅ 已添加任务: \\(title)")
    }
    
    func completeTask(id: UUID) {
        if let index = tasks.firstIndex(where: { $0.id == id }) {
            tasks[index].isCompleted = true
            print("🎉 完成任务: \\(tasks[index].title)")
        }
    }
    
    func tasksByPriority(_ priority: Task.Priority) -> [Task] {
        return tasks.filter { $0.priority == priority }
    }
    
    var progress: Double {
        guard !tasks.isEmpty else { return 0 }
        let completed = tasks.filter { $0.isCompleted }.count
        return Double(completed) / Double(tasks.count)
    }
    
    func printSummary() {
        print("\\n📋 任务管理系统")
        print(String(repeating: "-", count: 30))
        print("总任务数: \\(tasks.count)")
        print("完成进度: \\(Int(progress * 100))%")
        print(String(repeating: "-", count: 30))
        
        for priority in Task.Priority.allCases {
            let count = tasksByPriority(priority).count
            print("\\(priority.rawValue)优先级: \\(count) 个")
        }
    }

                escaped = escaped.replace(/\b\d+\b/g, '<span class="code-number">$&</span>');
            } else if (langName === 'PHP') {
                escaped = escaped.replace(/\/\/.*$/gm, '<span class="code-comment">$&</span>');
                escaped = escaped.replace(/\/\*[\s\S]*?\*\//g, '<span class="code-comment">$&</span>');
                escaped = escaped.replace(/(#.*$)/gm, '<span class="code-comment">$1</span>');
                escaped = escaped.replace(/\b(class|public|private|protected|function|static|array|if|else|foreach|for|while|return|new|this|extends|implements|interface|abstract|null|true|false|try|catch|throw|echo|print|include|require|namespace|use|const)\b/g, '<span class="code-keyword">$1</span>');
                escaped = escaped.replace(/(["'])((?:\\.|[^\\])*?)\1/g, '<span class="code-string">$&</span>');
                escaped = escaped.replace(/\b\d+\b/g, '<span class="code-number">$&</span>');
            } else if (langName === 'Swift') {
                escaped = escaped.replace(/\/\/.*$/gm, '<span class="code-comment">$&</span>');
                escaped = escaped.replace(/\b(let|var|func|class|struct|enum|protocol|extension|if|else|for|while|return|import|guard|defer|switch|case|default|break|continue|self|Self|true|false|nil|String|Int|Double|Bool|Array|Dictionary|Optional|some|any|async|await|throws|rethrows|try|catch)\b/g, '<span class="code-keyword">$1</span>');
                escaped = escaped.replace(/(["'])((?:\\.|[^\\])*?)\1/g, '<span class="code-string">$&</span>');
                escaped = escaped.replace(/\b\d+\b/g, '<span class="code-number">$&</span>');
            }
            
            return escaped;
        }

        function closePopup() {
            popupOverlay.classList.remove('active');
        }

        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) {
                closePopup();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePopup();
            }
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderLanguages(btn.dataset.filter);
            });
        });

        function animateNumber(el, target) {
            let current = 0;
            const increment = target / 30;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                el.textContent = Math.floor(current);
            }, 30);
        }

        renderLanguages();
        animateNumber(totalLangsEl, languages.length);
    </script>
</body>
</html>
