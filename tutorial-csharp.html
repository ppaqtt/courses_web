{id:1,t:'C#简介与.NET平台',p:['C#由微软Anders Hejlsberg主导开发，2000年发布，是现代、类型安全、面向对象的编程语言。','.NET平台包含CLR（公共语言运行时）和FCL（框架类库），提供跨语言互操作性。','.NET演进历程：.NET Framework→.NET Core→.NET 5/6/7/8，当前统一为.NET 8及后续版本。','应用领域广泛：Web开发(ASP.NET Core)、桌面应用(WPF/WinForms)、移动开发(MAUI)、游戏开发(Unity)、云计算(Azure)。','核心语言特性：强类型、自动垃圾回收(GC)、泛型、LINQ、异步编程、模式匹配等。'],
c:`using System;
namespace CSharpIntro
{
    class Program
    {
        static void Main(string[] args)
        {
            Console.WriteLine("欢迎来到C#世界！");
            Console.WriteLine($"当前.NET版本: {Environment.Version}");
            Console.WriteLine($"操作系统: {Environment.OSVersion}");
            Console.WriteLine($"64位系统: {Environment.Is64BitOperatingSystem}");
        }

}`,
et:'Main方法签名错误',ec:`// 错误：Main首字母小写
static void main(string[] args) // ❌ C#区分大小写

// 正确：Main首字母大写

// .NET 6+支持顶级语句
Console.WriteLine("Hello"); // ✅`,
q:[{q:'C#运行在什么平台上？两个核心组件是什么？',a:'运行在.NET平台上，核心组件是CLR（公共语言运行时）和FCL（框架类库）。'}]},

{id:2,t:'开发环境配置',p:['安装.NET SDK后可在终端使用dotnet命令创建、编译、运行项目。','IDE选择：Visual Studio 2022(Windows)、VS Code(轻量跨平台+C# Dev Kit扩展)、JetBrains Rider(跨平台)。','项目类型：console(控制台)、classlib(类库)、webapi(Web API)、xunit(测试)等，使用dotnet new命令创建。','NuGet包管理：通过dotnet add package命令添加第三方库。'],
c:`# 检查.NET SDK版本

{id:3,t:'第一个C#程序',p:['程序结构：using声明→namespace命名空间→class类→Main方法，这是C#程序的基本骨架。','顶级语句(.NET 6+)：无需显式定义namespace、class、Main方法。','Console类：WriteLine输出到控制台、ReadLine读取用户输入。','字符串插值：使用$前缀，在花括号中嵌入变量，如$"{name}你好"。'],
c:`using System;
namespace HelloWorld
{
    class Program
    {
        static void Main(string[] args)
        {
            Console.WriteLine("请输入你的名字：");
            string name = Console.ReadLine();
            Console.WriteLine($"你好，{name}！欢迎学习C#！");
            Console.WriteLine("当前时间: " + DateTime.Now);
        }
    }
}`,
et:'缺少using或分号',ec:`// 错误1：缺少using System
Console.WriteLine("Hello"); // ❌ Console未定义
// 错误2：缺少分号
Console.WriteLine("Hello") // ❌
// 正确写法
using System;
Console.WriteLine("Hello"); // ✅`},
q:[{q:'编写程序读取用户年龄，输出"你今年X岁，10年后X+10岁"',a:'Console.WriteLine("请输入年龄：");\nint age=int.Parse(Console.ReadLine());\nConsole.WriteLine($"你今年{age}岁，10年后{age+10}岁");'}]},

{id:4,t:'注释与命名规范',p:['单行注释//，多行注释/* */，XML文档注释///可生成API文档。','PascalCase：类名、方法名、属性名；camelCase：局部变量、方法参数；_camelCase：私有字段。','接口以I前缀开头如IRepository，常量全大写如MAX_SIZE。','命名原则：有意义、避免缩写、不使用C#关键字。'],
c:`using System;
/// <summary>学生管理类</summary>
class StudentManager
{
    private int _studentCount; // 私有字段
    public int StudentCount { get; set; } // 属性PascalCase
    
    /* 添加学生方法 */
    public void AddStudent(string name, int age) // 方法PascalCase
    {
        int maxAge = 150; // 局部变量camelCase
    }
}
interface IStudentRepository // 接口I前缀
{ 
    Student GetStudent(int id); 
}`,
et:'命名不规范',ec:`// ❌ 不规范命名
class student_manager { }  // 应改为StudentManager
int Num = 150;             // 局部变量应改为num
string s = "张三";         // 应改为name
// ✅ 规范命名
class StudentManager { }
int num = 150;
string name = "张三";`},
q:[{q:'指出不规范命名：class user_info、int Num、interface repository',a:'user_info→UserInfo(PascalCase无下划线)；Num→num(camelCase)；repository→IRepository(I前缀)'}]},

{id:5,t:'基本数据类型',p:['整数类型：sbyte/byte(8位)、short/ushort(16位)、int/uint(32位)、long/ulong(64位)。','浮点类型：float(7位精度,f后缀)、double(15位精度,默认)、decimal(28位精度,m后缀,适合财务计算)。','布尔类型bool只有true/false两个值，不可用0/1替代。','char单字符(单引号)、string字符串(双引号,引用类型)。','值类型在栈上分配(int,double,bool,char,struct)，引用类型在堆上分配(string,object,class)。'],
c:`using System;
class Program
{
    static void Main()
    {
        int age = 25;
        long population = 7800000000L;
        float price = 19.99f;
        double pi = 3.14159265358979;
        decimal money = 9999.99m;
        bool isStudent = true;
        char grade = 'A';
        string name = "张三";
        
        Console.WriteLine($"int占{sizeof(int)}字节");
        Console.WriteLine($"{name}成绩{grade}，年龄{age}");
        Console.WriteLine($"价格: {money:C}");
    }
}`,
et:'浮点后缀遗漏和精度问题',ec:`float f = 3.14;   // ❌ 默认是double类型
float f = 3.14f;  // ✅ 添加f后缀
double a = 0.1 + 0.2;
if(a == 0.3){}      // ❌ 精度问题
if(Math.Abs(a - 0.3) < 0.0001){} // ✅ 比较差值`},
q:[{q:'存储商品价格应用什么类型？为什么？',a:'使用decimal(后缀m)，因为float/double存在精度问题，decimal有28-29位精度专为财务计算设计。'}]},

{id:6,t:'变量与常量',p:['变量声明：类型 变量名=值; 必须先声明后使用。','var关键字：编译器自动推断类型，必须初始化，var x=10等同于int x=10。','const：编译时常量，声明时必须赋值，不可修改，隐式静态。','readonly：运行时常量，可在构造函数中赋值后不可修改。'],
c:`using System;
class Config
{
    public const string AppName = "MyApp";
    public readonly DateTime CreateTime;
    
    public Config() 
    { 
        CreateTime = DateTime.Now; 
    }
}
class Program
{
    static void Main()
    {
        int count = 10;
        var age = 25; 
        var message = "Hello";
        const double PI = 3.14159;
        
        Console.WriteLine($"应用名称: {Config.AppName}");
        Console.WriteLine($"PI = {PI}");
    }

et:'var和const使用不当',ec:`var x;          // ❌ var必须初始化
var x = 10;     // ✅
const int MAX;  // ❌ const必须赋初值
const int MAX = 100; // ✅
MAX = 200;      // ❌ 常量不可修改`},
q:[{q:'const和readonly的区别？',a:'const编译时确定值，隐式静态，声明时必须赋值；readonly运行时确定，可在构造函数中赋值，实例字段。'}]},

{id:7,t:'类型转换',p:['隐式转换：小范围类型→大范围类型自动转换(int→long, float→double)，不会丢失精度。','显式转换：(类型)值，大范围→小范围可能丢失精度或溢出。','Convert类：Convert.ToInt32/ToString等，提供安全的类型转换方法。','Parse/TryParse：字符串→数值转换，Parse失败抛出异常，TryParse返回bool更安全。'],
c:`using System;
class Program
{
    static void Main()
    {
        int num = 100; 
        long bigNum = num; // 隐式转换
        
        double pi = 3.14; 
        int i = (int)pi; // 显式转换，i=3
        
        int converted = Convert.ToInt32("123");
        int parsed = int.Parse("456");
        
        if (int.TryParse("abc", out int result))
            Console.WriteLine(result);
        else
            Console.WriteLine("解析失败");
    }
}`,
et:'无效字符串解析',ec:`int n = int.Parse("hello"); // ❌ 抛出FormatException
// 正确：使用TryParse
if(int.TryParse("hello", out int r))
    Console.WriteLine(r);
else 
    Console.WriteLine("无效数字"); // ✅`},
q:[{q:'安全将字符串转整数，无效时提示用户',a:'string input = Console.ReadLine();\nif(int.TryParse(input, out int num)) \n    Console.WriteLine(num);\nelse \n    Console.WriteLine("请输入有效数字");'}]},

{id:8,t:'运算符',p:['算术运算符：+ - * / %，整数除法会截断小数部分，注意溢出使用checked。','关系运算符：== != > < >= <=，返回bool值，浮点类型不建议用==比较。','逻辑运算符：&&(短路与)、||(短路或)、!(非)。','赋值运算符：= += -= *= /= %= ??=，??空合并运算符，?.空条件运算符，?:三元运算符。'],
c:`using System;
class Program
{
    static void Main()
    {
        int a = 17, b = 5;
        Console.WriteLine($"17/5={a/b}");   // 3
        Console.WriteLine($"17%5={a%b}");     // 2
        
        int x = 5;
        Console.WriteLine($"x++={x++}"); // 5
        Console.WriteLine($"++x={++x}"); // 7
        
        string category = 20 >= 18 ? "成年" : "未成年";
        string name = null;
        Console.WriteLine(name ?? "匿名");
        
        string s = null;
        Console.WriteLine($"长度:{s?.Length}");
    }
}`,
et:'整数除法丢失精度',ec:`double r = 1 / 2;      // ❌ 结果是0
double r = 1.0 / 2;    // ✅ 结果是0.5
double r = (double)1 / 2; // ✅ 结果是0.5`},
q:[{q:'10/3和10.0/3的结果分别是什么？',a:'10/3=3(整数除法截断)；10.0/3=3.333...(至少一个浮点操作数)。'}]},

{id:9,t:'if-else语句',p:['语法：if(条件){}else{}，条件必须是bool类型，不能用整数。','else if链：多条件依次判断，命中后跳过后续条件判断。','嵌套if：if语句内部嵌套if语句，建议嵌套不超过3层。','C#条件必须是bool：if(1)不允许，必须写成if(true)或if(condition)。'],
c:`using System;
class Program
{
    static void Main()
    {
        int score = 85;
        if(score >= 90) Console.WriteLine("优秀");
        else if(score >= 80) Console.WriteLine("良好");
        else if(score >= 60) Console.WriteLine("及格");
        else Console.WriteLine("不及格");
        
        // 嵌套if示例
        int age = 25; 
        bool hasLicense = true;
        if(age >= 18)
        {
            if(hasLicense) Console.WriteLine("可驾驶");
            else Console.WriteLine("需考驾照");
        }
    }
}`,
et:'条件使用非bool值',ec:`int c = 5;
if(c){}     // ❌ 不能用int作条件
if(c = 5){}   // ❌ 这是赋值不是比较
if(c > 0){}   // ✅ 比较返回bool
if(c == 5){}  // ✅ 相等比较`},
q:[{q:'编写判断闰年的程序',a:'int year = int.Parse(Console.ReadLine());\nif((year % 4 == 0 && year % 100 != 0) || year % 400 == 0) \n    Console.WriteLine($"{year}是闰年");\nelse \n    Console.WriteLine($"{year}不是闰年");'}]},

{id:10,t:'switch语句',p:['基本语法：switch(表达式){case值:break;default:break;}，每个case必须有break。','支持的类型：int、string、enum、bool等。','模式匹配(C#7+)：case when条件模式、case类型模式。','switch表达式(C#8+)：value switch{模式=>结果,...}，更简洁的写法。'],
c:`using System;
class Program
{
    static void Main()
    {
        string day = "Monday";
        switch(day)
        {
            case "Monday": case "Tuesday": case "Wednesday":
            case "Thursday": case "Friday":
                Console.WriteLine("工作日"); 
                break;
            case "Saturday": case "Sunday":
                Console.WriteLine("周末"); 
                break;
            default: 
                Console.WriteLine("无效"); 
                break;
        }
        
        int score = 85;
        string grade = score switch
        { 
            >= 90 => "A", 
            >= 80 => "B", 
            >= 70 => "C", 
            >= 60 => "D", 
            _ => "F" 
        };
        Console.WriteLine($"等级:{grade}");
    }
}`,
et:'case穿透缺少break',ec:`switch(x)
{
    case 1: Console.WriteLine("一"); // ❌ 缺少break会穿透
    case 2: Console.WriteLine("二"); break;
}
// 正确：合并case
case 1: case 2: Console.WriteLine("一或二"); break; // ✅`},
q:[{q:'用switch表达式根据月份返回天数(2月按28天算)',a:'int days = month switch{ 2 => 28, 4 or 6 or 9 or 11 => 30, _ => 31 };'}]},

{id:11,t:'for循环',p:['语法：for(初始化;条件;迭代){}，三部分都可省略。','执行流程：初始化→判断条件→执行循环体→迭代→判断条件→...','嵌套for：二维遍历场景常用，注意性能影响。','break跳出整个循环，continue跳过当前次迭代。'],
c:`using System;
class Program
{
    static void Main()
    {
        int sum = 0;
        for(int i = 1; i <= 10; i++) 
            sum += i;
        Console.WriteLine($"1-10和:{sum}");
        
        // 九九乘法表
        for(int i = 1; i <= 9; i++)
        {
            for(int j = 1; j <= i; j++)
                Console.Write($"{j}×{i}={i*j}\t");
            Console.WriteLine();
        }
        
        for(int i = 1; i <= 10; i++)
        {
            if(i == 3) continue;
            if(i == 8) break;
            Console.Write(i + " "); // 1 2 4 5 6 7
        }
    }
}`,
et:'循环条件错误导致死循环',ec:`for(int i = 0; i < 10; i--){} // ❌ i递减，永远小于10
for(int i = 0; i < 10; i++){} // ✅ i递增`},
q:[{q:'输出1-100中能被3整除但不能被5整除的数',a:'for(int i = 1; i <= 100; i++)\n    if(i % 3 == 0 && i % 5 != 0)\n        Console.WriteLine(i);'}]},

{id:12,t:'while与do-while',p:['while循环：先判断条件后执行，可能0次执行。','do-while循环：先执行后判断条件，至少执行1次，末尾有分号。','选择建议：确定至少执行一次用do-while，否则用while。','常见用途：读取用户输入直到有效、游戏主循环等。'],
c:`using System;
class Program
{
    static void Main()
    {
        // while猜数字游戏
        int target = 42, guess;
        while(true)
        {
            guess = int.Parse(Console.ReadLine());
            if(guess == target)
            {
                Console.WriteLine("对了!");
                break;
            }
            else if(guess < target) 
                Console.WriteLine("太小");
            else 
                Console.WriteLine("太大");
        }
        
        // do-while：至少执行一次
        int n;
        do
        {
            Console.Write("输入正整数:");
            n = int.Parse(Console.ReadLine());
        }
        while(n <= 0);
        Console.WriteLine($"你输入:{n}");
    }
}`,
et:'忘记更新循环变量',ec:`int i = 0;
while(i < 10)
{
    Console.WriteLine(i);
} // ❌ 死循环，缺少i++

while(i < 10)
{
    Console.WriteLine(i);
    i++;
} // ✅`},
q:[{q:'用while计算1+2+...+n',a:'int n = int.Parse(Console.ReadLine()), sum = 0, i = 1;\nwhile(i <= n)\n{\n    sum += i;\n    i++;\n}\nConsole.WriteLine($"和:{sum}");'}]},

{id:13,t:'foreach循环',p:['语法：foreach(类型 变量 in 集合){}，自动遍历每个元素。','适用范围：数组、List、Dictionary等实现IEnumerable接口的集合。','只读特性：不能修改元素值(值类型)，不能增删集合元素。','与for对比：更简洁安全，但无法获取索引。'],
c:`using System;
using System.Collections.Generic;
class Program
{
    static void Main()
    {
        string[] fruits = {"苹果","香蕉","橙子"};
        foreach(string f in fruits) 
            Console.WriteLine(f);
        
        List<int> scores = new List<int>{95, 88, 92};
        int total = 0;
        foreach(int s in scores) 
            total += s;
        Console.WriteLine($"平均:{(double)total/scores.Count:F1}");
        
        var ages = new Dictionary<string, int>
        {
            {"张三", 20},
            {"李四", 22}
        };
        foreach(var kv in ages) 
            Console.WriteLine($"{kv.Key}:{kv.Value}岁");
    }
}`,
et:'foreach中修改集合',ec:`List<int> nums = new List<int>{1, 2, 3, 4, 5};
foreach(int n in nums) 
    if(n % 2 == 0) nums.Remove(n); // ❌ 抛出异常

// 正确方法：RemoveAll
nums.RemoveAll(n => n % 2 == 0); // ✅

// 或使用倒序for循环
for(int i = nums.Count - 1; i >= 0; i--) 
    if(nums[i] % 2 == 0) nums.RemoveAt(i); // ✅`},
q:[{q:'foreach中能否修改集合元素？为什么？',a:'不能修改值类型元素(迭代变量是只读副本)，也不能增删集合(会抛出InvalidOperationException)。需修改用for循环，需删除用RemoveAll或倒序for。'}]},

{id:14,t:'一维数组',p:['声明方式：int[] arr = new int[5];或int[] arr = {1,2,3};数组大小固定。','索引从0开始，越界访问抛出IndexOutOfRangeException。','Array类静态方法：Sort/Reverse/IndexOf/Clear等。','遍历方式：for(可用索引)或foreach(只读)。'],
c:`using System;
class Program
{
    static void Main()
    {
        int[] arr = {85, 92, 76, 95, 88};
        
        Array.Sort(arr);
        Console.WriteLine("排序:" + string.Join(",", arr));
        
        Array.Reverse(arr);
        Console.WriteLine("反转:" + string.Join(",", arr));
        
        Console.WriteLine($"92的索引:{Array.IndexOf(arr, 92)}");
        
        int max = arr[0], min = arr[0], sum = 0;
        foreach(int s in arr)
        {
            max = Math.Max(max, s);
            min = Math.Min(min, s);
            sum += s;
        }
        Console.WriteLine($"最大:{max},最小:{min},平均:{(double)sum/arr.Length:F1}");
    }
}`,
et:'数组越界访问',ec:`int[] arr = {1, 2, 3};
Console.WriteLine(arr[3]); // ❌ 越界，最大索引是2

Console.WriteLine(arr[arr.Length - 1]); // ✅ 获取最后一个元素
Console.WriteLine(arr[^1]); // ✅ C#8+支持从末尾索引`},
q:[{q:'输入5个整数，输出最大值、最小值和平均值',a:'int[] nums = new int[5];\nfor(int i = 0; i < 5; i++) \n    nums[i] = int.Parse(Console.ReadLine());\nint mx = nums[0], mn = nums[0], s = 0;\nforeach(int x in nums)\n{\n    mx = Math.Max(mx, x);\n    mn = Math.Min(mn, x);\n    s += x;\n}\nConsole.WriteLine($"最大:{mx},最小:{mn},平均:{(double)s/5}");'}]},

{id:15,t:'多维数组',p:['矩形数组：int[,] arr = new int[3,4];每行长度相同，用[,]访问。','交错数组：int[][] arr = new int[3][];每行可不同长度，用[][]访问。','GetLength(0)获取行数，GetLength(1)获取列数。','遍历方式：嵌套for循环。'],
c:`using System;
class Program
{
    static void Main()
    {
        int[,] matrix = {{1,2,3},{4,5,6},{7,8,9}};
        Console.WriteLine($"行:{matrix.GetLength(0)},列:{matrix.GetLength(1)}");
        
        for(int i = 0; i < matrix.GetLength(0); i++)
        {
            for(int j = 0; j < matrix.GetLength(1); j++)
                Console.Write($"{matrix[i,j]}\t");
            Console.WriteLine();
        }
        
        int[][] jagged = new int[3][];
        jagged[0] = new int[]{1, 2}; 
        jagged[1] = new int[]{3, 4, 5}; 
        jagged[2] = new int[]{6};
        
        for(int i = 0; i < jagged.Length; i++)
        {
            for(int j = 0; j < jagged[i].Length; j++) 
                Console.Write(jagged[i][j] + " ");
            Console.WriteLine();
        }
    }
}`,
et:'混淆矩形和交错数组语法',ec:`int[,] rect = new int[3, 4];
rect[0][1] = 5; // ❌ 矩形数组不能用[][]访问
rect[0, 1] = 5;  // ✅

int[][] jagged = new int[3][];
jagged[0, 1] = 5;  // ❌ 交错数组不能用[,]访问
jagged[0][1] = 5; // ✅(需先初始化jagged[0])`},
q:[{q:'3x3矩阵计算主对角线元素之和',a:'int[,] m = {{1,2,3},{4,5,6},{7,8,9}}; int s = 0;\nfor(int i = 0; i < 3; i++) \n    s += m[i, i];\nConsole.WriteLine($"主对角线和:{s}"); // 结果15'}]},

{id:16,t:'字符串操作',p:['string不可变性：每次"修改"都会创建新字符串，频繁操作用StringBuilder。','常用方法：Length, Substring, Split, Join, Replace, Trim, ToUpper/ToLower, Contains。','比较方式：==值比较，Equals方法，CompareTo方法。','StringBuilder：Append/Insert/Remove/Replace，频繁字符串拼接性能更优。','格式化：$"{value}"插值，ToString("格式")方法。'],
c:`using System;
using System.Text;
class Program
{
    static void Main()
    {
        string s = "  Hello, C# World!  ";
        Console.WriteLine($"长度:{s.Length}");
        Console.WriteLine($"Trim:'{s.Trim()}'");
        Console.WriteLine($"大写:{s.ToUpper()}");
        Console.WriteLine($"包含C#:{s.Contains("C#")}");
        Console.WriteLine($"子串:{s.Substring(4, 5)}");
        
        string[] fruits = "苹果,香蕉,橙子".Split(',');
        Console.WriteLine(string.Join(" | ", fruits));
        Console.WriteLine(s.Replace("C#", "CSharp"));
        
        StringBuilder sb = new StringBuilder();
        for(int i = 0; i < 1000; i++) 
            sb.Append($"行{i},");
        
        Console.WriteLine($"{99.9:C}"); // ¥99.90
    }
}`,
et:'循环中用+拼接字符串',ec:`string s = "";
for(int i = 0; i < 10000; i++) 
    s += i; // ❌ 创建10000个临时对象，性能差

StringBuilder sb = new StringBuilder();
for(int i = 0; i < 10000; i++) 
    sb.Append(i); // ✅ 性能优异
string result = sb.ToString();`},
q:[{q:'统计句子中每个单词出现次数',a:'var words = "hello world hello csharp".Split(" ");\nvar count = new Dictionary<string, int>();\nforeach(var w in words)\n    count[w] = count.GetValueOrDefault(w, 0) + 1;\nforeach(var kv in count) \n    Console.WriteLine($"{kv.Key}:{kv.Value}次");'}]},

{id:17,t:'方法定义',p:['声明语法：访问修饰符 返回类型 方法名(参数列表){方法体}。','参数传递：值参数(默认)、ref引用参数、out输出参数、params可变参数。','return语句返回结果，void表示无返回值。','递归：方法调用自身，必须有终止条件。'],
c:`using System;
class Calculator
{
    public int Add(int a, int b) => a + b;
    
    public void Swap(ref int a, ref int b)
    {
        int temp = a;
        a = b;
        b = temp;
    }
    
    public void Divide(int a, int b, out int quotient, out int remainder)
    {
        quotient = a / b;
        remainder = a % b;
    }
    
    public int Sum(params int[] nums)
    {
        int total = 0;
        foreach(int n in nums) 
            total += n;
        return total;
    }
    
    public long Factorial(int n) => n <= 1 ? 1 : n * Factorial(n - 1);
}
class Program
{
    static void Main()
    {
        var calc = new Calculator();
        Console.WriteLine(calc.Add(3, 5));
        
        int x = 10, y = 20;
        calc.Swap(ref x, ref y);
        Console.WriteLine($"x={x},y={y}");
        
        calc.Divide(17, 5, out int q, out int r);
        Console.WriteLine($"17÷5={q}余{r}");
        
        Console.WriteLine(calc.Sum(1, 2, 3, 4, 5));
        Console.WriteLine($"5!={calc.Factorial(5)}");
    }
}`,
et:'ref/out参数未初始化',ec:`int a; // 未赋值
calc.Swap(ref a, ref b); // ❌ ref参数必须先初始化

int a = 10; // ✅
calc.Swap(ref a, ref b);

// out参数不需要预先初始化
calc.Divide(17, 5, out int q, out int r); // ✅`},
q:[{q:'ref和out参数的区别',a:'ref调用前必须初始化，方法内可不修改；out调用前不需要初始化，方法内必须赋值。ref双向传递，out主要用于返回多个值。'}]},

{id:18,t:'方法重载',p:['重载概念：同名方法，参数列表不同(类型/数量/顺序)，与返回类型无关。','编译器根据调用时的参数选择最匹配的版本。','常见场景：同一操作支持不同参数类型、不同参数数量。','ref/out也构成重载差异。'],
c:`using System;
class Printer
{
    public void Print(int v) 
    { 
        Console.WriteLine($"整数:{v}"); 
    }
    
    public void Print(double v) 
    { 
        Console.WriteLine($"浮点:{v:F2}"); 
    }
    
    public void Print(string v) 
    { 
        Console.WriteLine($"字符串:{v}"); 
    }
    
    public int Max(int a, int b) => a > b ? a : b;
    
    public int Max(int a, int b, int c) => Max(Max(a, b), c);
}
class Program
{
    static void Main()
    {
        var p = new Printer();
        p.Print(42); 
        p.Print(3.14); 
        p.Print("Hello");
        
        Console.WriteLine(new Printer().Max(3, 5));
        Console.WriteLine(new Printer().Max(3, 5, 8));
    }
}`,
et:'仅返回类型不同的重载',ec:`int GetValue() { return 1; }
double GetValue() { return 1.0; } // ❌ 仅返回类型不同不构成重载

int GetValue(int x) { return x; } // ✅ 参数列表不同
double GetValue(double x) { return x; } // ✅ 参数列表不同`},
q:[{q:'void Set(int x)和int Set(int x)是否合法重载？',a:'不合法，仅返回类型不同不构成重载，编译器无法根据返回类型区分调用。'}]},

{id:19,t:'可选与命名参数',p:['可选参数：声明时指定默认值，如void Foo(int x, int y = 10)。','命名参数：调用时使用参数名:值形式，可按任意顺序传递。','可选参数必须在必选参数之后，默认值必须是编译时常量。','命名参数可跳过可选参数，提高代码可读性。'],
c:`using System;
class Config
{
    public void Create(string name, string ext = ".txt", bool overwrite = false)
    {
        Console.WriteLine($"创建:{name}{ext},覆盖:{overwrite}");
    }
}
class Program
{
    static void Main()
    {
        var c = new Config();
        c.Create("data");                    // data.txt,覆盖:False
        c.Create("log", ".log");              // log.log,覆盖:False
        c.Create("config", overwrite: true);    // config.txt,覆盖:True
        c.Create(ext: ".tmp", name: "cache");    // cache.tmp,覆盖:False
    }
}`,
et:'可选参数在必选参数之前',ec:`void Foo(int x = 1, int y) {} // ❌ 可选参数不能在必选参数之前
void Foo(int y, int x = 1) {} // ✅

Foo(10);     // y=10, x=1
Foo(10, 20);  // y=10, x=20`},
q:[{q:'Foo(int a, int b = 5, int c = 10)只传a和c=20怎么写？',a:'Foo(a: 1, c: 20); 或 Foo(1, c: 20); b使用默认值5。'}]},

{id:20,t:'类与对象',p:['类是蓝图/模板，对象是类的实例，使用new关键字创建。','访问修饰符：public(公开)/private(私有)/protected(受保护)/internal(内部)。','字段(存储数据，通常private)vs属性(受控访问，get/set)。','this关键字：引用当前实例，区分同名参数。'],
c:`using System;
class Person
{
    private string _name; 
    private int _age;
    
    public string Name
    { 
        get => _name; 
        set => _name = value; 
    }
    
    public int Age
    { 
        get => _age; 
        set 
        { 
            if(value >= 0 && value <= 150) 
                _age = value; 
            else 
                Console.WriteLine("年龄无效"); 
        } 
    }
    
    public Person(string name, int age)
    {
        _name = name;
        _age = age;
    }
    
    public void Introduce() => Console.WriteLine($"我叫{_name}，{_age}岁");
}
class Program
{
    static void Main()
    {
        var p = new Person("张三", 25);
        p.Introduce();
        
        p.Age = -5; // 年龄无效
        p.Name = "李四"; 
        p.Introduce();
    }
}`,
et:'直接暴露public字段',ec:`class Person { public int Age; } // ❌ 无验证逻辑
Person p = new Person(); 
p.Age = -100; // 可赋任意值

class Person 
{ 
    private int _age; // ✅ 使用私有字段+属性
    public int Age
    { 
        get => _age; 
        set 
        { 
            if(value >= 0) 
                _age = value; 
        } 
    } 
}`},
q:[{q:'类和对象的关系？如何创建对象？',a:'类是模板/蓝图，对象是类的实例。使用new关键字创建：Person p = new Person("张三", 25);'}]},

{id:21,t:'属性(Property)',p:['自动属性：public string Name { get; set; }编译器自动生成私有字段。','只读属性：只有get访问器或get+init访问器。','init访问器(C#9+)：只在初始化时赋值，之后不可修改。','表达式体属性：public string Info => $"{Name}({Id})";'],
c:`using System;
class Student
{
    public string Name { get; set; }
    public int Id { get; set; }
    public DateTime EnrollDate { get; } = DateTime.Now;
    public string Major { get; init; }
    public string Info => $"{Name}(ID:{Id})";
    
    private double _score;
    public double Score
    { 
        get => _score; 
        set => _score = value >= 0 && value <= 100 ? value : throw new ArgumentException(); 
    }
}
class Program
{
    static void Main()
    {
        var s = new Student { Name = "张三", Id = 1001, Major = "计算机" };
        s.Score = 95;
        // s.Major = "数学"; // ❌ init访问器不可再赋值
        Console.WriteLine(s.Info);
    }
}`,
et:'类外修改只读属性',ec:`var s = new Student();
s.EnrollDate = DateTime.Now; // ❌ 只读属性不可赋值

public DateTime EnrollDate { get; } = DateTime.Now; // ✅ 声明时赋值`},
q:[{q:'get/set、get/init、只有get各适用什么场景？',a:'get/set：可读写随时修改；get/init：初始化后不可变，适合配置项；只有get：完全只读，构造/声明时确定。'}]},

{id:22,t:'构造函数',p:['构造函数：与类同名无返回类型，new创建对象时自动调用用于初始化。','不定义构造函数时编译器生成无参默认构造函数，自定义后不再生成。','构造函数链：this()调用其他构造函数减少重复代码。','静态构造函数：static修饰，只执行一次，用于初始化静态成员。'],
c:`using System;
class Rectangle
{
    public double Width { get; set; } 
    public double Height { get; set; }
    public static int Count { get; private set; }
    
    public Rectangle() : this(1, 1) { }
    public Rectangle(double side) : this(side, side) { }
    public Rectangle(double w, double h)
    {
        Width = w;
        Height = h;
        Count++;
    }
    
    static Rectangle()
    {
        Count = 0;
        Console.WriteLine("静态构造执行");
    }
    
    public double Area() => Width * Height;
}
class Program
{
    static void Main()
    {
        var r1 = new Rectangle();
        var r2 = new Rectangle(5);
        var r3 = new Rectangle(4, 6);
        
        Console.WriteLine($"r1:{r1.Area()},r2:{r2.Area()},r3:{r3.Area()}");
        Console.WriteLine($"创建了{Rectangle.Count}个矩形");
    }
}`,
et:'定义有参构造后无参构造消失',ec:`class Foo { public Foo(int x) {} }
var f = new Foo(); // ❌ 无参构造函数不存在

public Foo() {} // ✅ 显式定义无参构造
var f = new Foo(0); // ✅ 使用已有构造`},
q:[{q:'什么是构造函数链？好处？',a:'一个构造函数调用另一个(用:this())，避免重复代码，初始化逻辑集中在主构造函数。'}]},

{id:23,t:'继承',p:['语法：class 子类:父类{}，C#只支持单继承，可实现多个接口。','virtual/override：父类用virtual标记，子类用override重写，实现运行时多态。','base关键字：调用父类构造函数base()、访问父类成员base.Method()。','sealed：密封类不可继承，密封方法不可再被重写。'],
c:`using System;
class Animal
{
    public string Name { get; set; }
    
    public Animal(string name) => Name = name;
    
    public virtual void Speak() => Console.WriteLine($"{Name}发出声音");
}
class Dog : Animal
{
    public Dog(string name) : base(name) { }
    
    public override void Speak() => Console.WriteLine($"{Name}:汪汪！");
    
    public void Fetch() => Console.WriteLine($"{Name}捡球");
}
class Cat : Animal
{
    public Cat(string name) : base(name) { }
    
    public override void Speak() => Console.WriteLine($"{Name}:喵~");
}
class Program
{
    static void Main()
    {
        Animal[] zoo = { new Dog("旺财"), new Cat("咪咪") };
        foreach(var a in zoo) 
            a.Speak(); // 多态：调用实际类型的方法
    }
}`,
et:'重写时不用override',ec:`class Dog : Animal
{
    public void Speak() {} // ❌ 隐藏而非重写，无override
}

public override void Speak() {} // ✅ 多态生效

public new void Speak() {} // 不推荐，父类引用无法调用`},
q:[{q:'override和new的区别？',a:'override重写虚方法，父类引用调用时执行子类版本(多态)；new隐藏父类方法，父类引用仍执行父类版本。应优先使用override。'}]},

{id:24,t:'多态',p:['多态概念：同一接口不同实现，通过virtual/override/abstract实现运行时多态。','向上转型：子类→父类，自动且安全。','向下转型：父类→子类，需(Dog)a或a as Dog，可能失败。','is/as模式匹配：is判断类型，as尝试转换，C#7+支持is Type var语法。'],
c:`using System;
abstract class Shape
{ 
    public abstract double Area(); 
}

class Circle : Shape
{ 
    public double Radius { get; set; } 
    public Circle(double r) => Radius = r; 
    public override double Area() => Math.PI * Radius * Radius; 
}

class Rectangle : Shape
{ 
    public double Width, Height; 
    public Rectangle(double w, double h) { Width = w; Height = h; } 
    public override double Area() => Width * Height; 
}

class Program
{
    static void Main()
    {
        Shape[] shapes = { new Circle(5), new Rectangle(4, 6) };
        
        foreach(Shape sh in shapes)
        {
            Console.WriteLine($"{sh.GetType().Name}面积:{sh.Area():F2}");
            if(sh is Circle c) 
                Console.WriteLine($"  半径:{c.Radius}");
        }
    }
}`,
et:'向下转型不检查类型',ec:`Shape s = new Circle(5);
Rectangle r = (Rectangle)s; // ❌ InvalidCastException

if(s is Rectangle) 
    r = (Rectangle)s; // ✅

Rectangle r2 = s as Rectangle; 
if(r2 != null) {} // ✅

if(s is Rectangle r3) {} // ✅ 模式匹配推荐写法`},
q:[{q:'什么是多态？C#如何实现？',a:'同一操作对不同对象产生不同行为。通过virtual/override实现：父类声明virtual，子类override重写，父类引用调用时执行子类版本。'}]},

{id:25,t:'抽象类',p:['abstract修饰，不能实例化，可包含抽象方法和具体方法。','抽象方法只有声明无实现，子类必须override实现。','vs接口：抽象类可有字段和实现，单继承；接口只定义契约，多实现。','设计选择：is-a关系+共享代码用抽象类，定义能力用接口。'],
c:`using System;
abstract class Shape
{
    public string Color { get; set; } = "白色";
    
    public abstract double Area();
    public abstract double Perimeter();
    
    public void Display() => Console.WriteLine($"{GetType().Name}({Color}):面积={Area():F2},周长={Perimeter():F2}");
}
class Circle : Shape
{
    public double Radius;
    public Circle(double r) => Radius = r;
    
    public override double Area() => Math.PI * Radius * Radius;
    public override double Perimeter() => 2 * Math.PI * Radius;
}
class Program
{
    static void Main()
    {
        Shape c = new Circle { Radius = 5, Color = "红" };
        c.Display();
    }
}`,
et:'抽象类实例化或子类未实现抽象方法',ec:`var s = new Shape(); // ❌ 抽象类不能实例化

class Bad : Shape 
{ 
    public override double Area() => 0; 
} // ❌ 缺少Perimeter实现

class Good : Shape 
{ 
    public override double Area() => 0; 
    public override double Perimeter() => 0; 
} // ✅`},
q:[{q:'抽象类和接口核心区别？何时用抽象类？',a:'抽象类可有字段和实现(单继承)，接口只定义签名无实现(多实现)。有is-a关系且子类共享代码用抽象类；定义能力契约或需多继承用接口。'}]},

{id:26,t:'接口',p:['interface IName { void Method(); }，成员默认public无实现(C#8前)。','多接口实现：class Bat : IMammal, IFlyable {}弥补单继承限制。','C#8+默认实现：接口可提供方法默认实现。','vs抽象类：接口=能做什么(能力)，抽象类=是什么(本质)。'],
c:`using System;
interface IDrawable { void Draw(); }
interface IResizable { void Resize(double factor); }
interface IColorable { string Color { get; set; } }

class Rectangle : IDrawable, IResizable, IColorable
{
    public double Width { get; set; } 
    public double Height { get; set; } 
    public string Color { get; set; } = "黑";
    
    public void Draw() => Console.WriteLine($"绘制{Color}矩形({Width}x{Height})");
    
    public void Resize(double factor)
    {
        Width *= factor;
        Height *= factor;
    }
}
class Program
{
    static void Main()
    {
        var r = new Rectangle { Width = 10, Height = 5, Color = "红" };
        r.Draw(); 
        r.Resize(2); 
        r.Draw();
        
        IDrawable d = r; 
        d.Draw();
        
        if(r is IColorable c) 
            Console.WriteLine(c.Color);
    }
}`,
et:'接口实例化或未实现所有成员',ec:`IDrawable d = new IDrawable(); // ❌ 接口不能实例化

class Bad : IDrawable 
{ 
    public void Draw() {} 
} // ✅ 实现了IDrawable

class Bad2 : IDrawable, IResizable 
{ 
    public void Draw() {} 
    /* 缺少Resize方法 ❌ */ 
}`},
q:[{q:'一个类能继承几个类？实现几个接口？',a:'只能继承1个类(单继承)，可实现多个接口。禁止多类继承避免菱形继承问题，多接口无此问题因为接口无实现。'}]},

{id:27,t:'泛型',p:['泛型类：class Stack<T>{}，T是类型参数，使用时Stack<int>。','泛型方法：void Swap<T>(ref T a, ref T b)。','泛型约束where T:struct/class/new()/基类/接口。','优势：类型安全、代码复用、无装箱开销。'],
c:`using System;
class Stack<T>
{
    private T[] _items; 
    private int _top = -1;
    
    public Stack(int capacity = 10) 
    { 
        _items = new T[capacity]; 
    }
    
    public void Push(T item)
    {
        if(_top == _items.Length - 1) 
            Array.Resize(ref _items, _items.Length * 2);
        _items[++_top] = item;
    }
    
    public T Pop() => _top >= 0 ? _items[_top--] : throw new InvalidOperationException("栈空");
    
    public int Count => _top + 1;
}

static class Utils
{

{id:35,t:'综合实战项目',p:['项目结构：分层架构(Model→Service→UI)。','功能需求：学生信息管理系统。','核心功能：增删改查(CRUD)、数据持久化。','技术要点：泛型集合、LINQ查询、文件操作、异常处理。'],
c:`using System; 
using System.Collections.Generic; 
using System.Linq; 
using System.IO;

class Student
{
    public int Id { get; set; }
    public string Name { get; set; }
    public int Age { get; set; }
    public string Major { get; set; }
}

class StudentService
{
    private List<Student> _students = new List<Student>();
    private string _filePath = "students.txt";
    
    public StudentService() => LoadFromFile();
    
    public List<Student> GetAll() => _students.ToList();
    
    public Student GetById(int id) => _students.FirstOrDefault(s => s.Id == id);
    
    public void Add(Student s)
    {
        s.Id = _students.Count > 0 ? _students.Max(s => s.Id) + 1 : 1;
        _students.Add(s);
        SaveToFile();
    }
    
    public void Update(Student s)
    {
        var idx = _students.FindIndex(st => st.Id == s.Id);
        if(idx >= 0)
        {
            _students[idx] = s;
            SaveToFile();
        }
    }
    
    public void Delete(int id)
    {
        _students.RemoveAll(s => s.Id == id);
        SaveToFile();
    }
    
    private void SaveToFile()
    {
        var lines = _students.Select(s => $"{s.Id},{s.Name},{s.Age},{s.Major}");
        File.WriteAllLines(_filePath, lines);
    }
    
    private void LoadFromFile()
    {
        if(File.Exists(_filePath))
        {
            foreach(var line in File.ReadAllLines(_filePath))
            {
                var parts = line.Split(',');
                _students.Add(new Student
                {
                    Id = int.Parse(parts[0]),
                    Name = parts[1],
                    Age = int.Parse(parts[2]),
                    Major = parts[3]
                });
            }
        }
    }
}
class Program
{
    static void Main()
    {
        var service = new StudentService();
        service.Add(new Student{Name="张三", Age=20, Major="计算机"});
        foreach(var s in service.GetAll())
            Console.WriteLine($"ID:{s.Id},姓名:{s.Name},年龄:{s.Age},专业:{s.Major}");
    }
}`,

catch(IOException ex)
{

function init() {

function renderSidebar() {

function escapeHtml(text) {
    return text.replace(/&/g, '&amp;')
               .replace(/</g, '&lt;')
               .replace(/>/g, '&gt;')
               .replace(/"/g, '&quot;');
}

function showChapter(id) {
    document.querySelectorAll('.chapter-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
    document.getElementById('ch' + id).classList.add('active');
    document.getElementById('ch_' + id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevChapter(id) {
    if(id > 1) showChapter(id - 1);
}

function nextChapter(id) {

}

function copyCode(id) {
    const code = document.getElementById(id).textContent;
    navigator.clipboard.writeText(code).then(() => {
        const toast = document.createElement('div');
        toast.className = 'toast show';
        toast.textContent = '代码已复制';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);

    const result = document.getElementById('res_' + chId + '_' + qIdx);
    
    if(userAns.toLowerCase() === correctAns.toLowerCase()) {
        result.className = 'quiz-result correct';
        result.innerHTML = '✅ 正确！';

        result.innerHTML = '❌ 不正确，请重试';
