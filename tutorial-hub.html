<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习中心 - 编程语言教程</title>
    <link rel="stylesheet" href="tutorial-style.css">
    <link rel="stylesheet" href="tutorial-features.css">
    <link rel="stylesheet" href="tutorial-extensions.css">
    <link rel="stylesheet" href="tutorial-advanced.css">
    <style>
        .hub-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .hub-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .hub-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .hub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }
        
        .hub-tab {
            padding: 12px 25px;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hub-tab:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent-color);
        }
        
        .hub-tab.active {
            background: var(--accent-color);
            color: white;
        }
        
        .hub-content {
            display: none;
        }
        
        .hub-content.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }
        
        .stat-card .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }
        
        .stat-card .stat-label {
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .path-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .snippet-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .snippet-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .snippet-controls select {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .no-data .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .action-card {
            flex: 1;
            min-width: 200px;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-md);
            text-decoration: none;
            color: inherit;
        }
        
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .action-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .action-card .title {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .action-card .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .share-section {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .share-preview {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .share-preview h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .reminder-settings {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
        }
        
        .reminder-status {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .reminder-badge {
            background: var(--success-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .lang-btn {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .lang-btn:hover {
            border-color: var(--accent-color);
        }
    </style>
</head>

    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateOverviewStats();
            AchievementSystem.updateUI();
            LearningPath.renderPaths('pathsContainer');
            renderSnippets();
            Leaderboard.render('leaderboardContainer');
            updateSharePreview();
            initExtensions();
            
            // 之前的功能
            LearningGoals.render('goalsContainer');
            CodeChallenges.render('challengesContainer', 'all');
            CodeTemplates.render('templatesContainer', 'python');
            ProjectTemplates.render('projectsContainer', 'all');
            VideoTutorials.render('videosContainer', 'python');
            APIDocs.render('apiDocsContainer', 'python');
            AssignmentSystem.render('assignmentsContainer', 'python');
            StudyGroups.render('groupsContainer');
            CodeReview.render('reviewContainer');
            KnowledgeAnalysis.render('masteryContainer', 'python');
            KeyboardShortcuts.render('shortcutsContainer');
            CustomThemes.render('themesContainer');
            LearningAnalytics.renderBarChart('timeChart');
            
            // 新增高级功能
            CodeReviewWorkflow.render('reviewWorkflowContainer');
            CodeReplay.render('replayContainer');
            SmartCompletion.render('completionContainer');
            CodeVisualizer.render('visualizerContainer');
            InteractiveQuiz.render('interactiveQuizContainer', 'all');
            GamificationSystem.render('gamificationContainer');
            LearningHeatmap.render('heatmapContainer');
            KnowledgeGraph.render('knowledgeGraphContainer');
            EfficiencyAnalyzer.render('efficiencyContainer');
            WrongAnswerBook.render('wrongBookContainer');
            GitIntegration.render('gitContainer');
            DatabaseManager.render('databaseContainer');
            APITester.render('apiTesterContainer');
            CodeQualityChecker.render('qualityContainer');
            CodeCoverage.render('coverageContainer');
            AdaptiveLearning.render('adaptiveContainer');
            LearningReport.render('reportContainer');
            SkillCertification.render('certificationContainer');
            CareerPlanner.render('careerContainer');
            DataExporter.render('exportContainer');
            MobileApp.render('mobileContainer');
        });
        
        // 显示标签页
        function showTab(tabId) {
            document.querySelectorAll('.hub-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.hub-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        // 更新概览统计
        function updateOverviewStats() {
            const stats = LearningStats.get();
            const hours = Math.floor(stats.totalStudyTime / 3600);
            const minutes = Math.floor((stats.totalStudyTime % 3600) / 60);
            
            const statsData = [
                { icon: '⏰', value: `${hours}h ${minutes}m`, label: t('totalStudyTime') },
                { icon: '📚', value: stats.chaptersCompleted.length, label: t('chaptersCompleted') },
                { icon: '🌐', value: Object.keys(stats.languagesProgress).length, label: t('languagesLearning') },
                { icon: '🔥', value: `${stats.dailyStreak} ${t('days')}`, label: t('streak') },
                { icon: '🏆', value: stats.achievements.length, label: t('achievements') },
                { icon: '📋', value: SnippetManager.getAll().length, label: t('snippets') }
            ];
            
            document.getElementById('overviewStats').innerHTML = statsData.map(s => `
                <div class="stat-card">
                    <div class="stat-icon">${s.icon}</div>
                    <div class="stat-value">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');
            
            // 详细统计
            document.getElementById('detailedStats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${stats.sessions?.length || 0}</div>
                    <div class="stat-label">学习会话</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">${stats.correctAnswers || 0}</div>
                    <div class="stat-label">正确答题</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">▶️</div>
                    <div class="stat-value">${stats.codeRuns || 0}</div>
                    <div class="stat-label">代码运行次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💾</div>
                    <div class="stat-value">${stats.snippetsSaved || 0}</div>
                    <div class="stat-label">保存的代码片段</div>
                </div>
            `;
        }
        
        // 渲染代码片段
        function renderSnippets(filter = 'all') {
            const snippets = filter === 'all' ? SnippetManager.getAll() : SnippetManager.getByLanguage(filter);
            const container = document.getElementById('snippetsContainer');
            
            if (snippets.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <div class="icon">📋</div>
                        <p>还没有保存任何代码片段</p>
                        <p>在教程页面点击保存按钮即可收藏代码</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = snippets.map(s => `
                <div class="snippet-card">
                    <div class="snippet-header">
                        <span class="snippet-title">${s.title}</span>
                        <span class="snippet-lang">${s.language}</span>
                    </div>
                    <pre class="snippet-code">${s.code}</pre>
                    <div class="snippet-footer">
                        <span class="snippet-date">${new Date(s.createdAt).toLocaleDateString()}</span>
                        <button class="btn-secondary" onclick="deleteSnippet(${s.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 筛选代码片段
        function filterSnippets() {
            const filter = document.getElementById('snippetFilter').value;
            renderSnippets(filter);
        }
        
        // 删除代码片段
        function deleteSnippet(id) {
            if (confirm('确定要删除这个代码片段吗？')) {
                SnippetManager.delete(id);
                renderSnippets();
            }
        }
        
        // 显示添加片段模态框
        function showAddSnippetModal() {
            SnippetManager.showSaveDialog('', 'javascript');
        }
        
        // 更新分享预览
        function updateSharePreview() {
            const stats = LearningStats.get();
            const chapters = stats.chaptersCompleted.length;
            const languages = Object.keys(stats.languagesProgress).length;
            
            document.getElementById('shareText').textContent = 
                `已完成 ${chapters} 个章节，学习了 ${languages} 种编程语言！`;
        }
        
        // 切换语言
        function toggleLanguage() {
            const newLang = window.toggleLanguage();
            document.getElementById('langBtn').textContent = newLang === 'zh' ? '🌐 中文' : '🌐 English';
            updateOverviewStats();
            AchievementSystem.updateUI();
            LearningPath.renderPaths('pathsContainer');
        }
    </script>
</body>
</html>
