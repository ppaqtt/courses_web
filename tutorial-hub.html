<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习中心 | 编程教程</title>
    <link rel="stylesheet" href="css/runoob-style.css">
    <style>
        .hub-container {
            max-width: 1200px;
            margin: 88px auto 48px;
            padding: 0 24px;
        }

        .hub-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .hub-header h1 {
            font-size: 36px;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .hub-header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-card .stat-number {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-card .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        .progress-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .progress-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .progress-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .progress-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-card-percent {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-hub {
            height: 8px;
            background: var(--bg-main);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-hub-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .quick-link:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .quick-link-icon {
            font-size: 28px;
        }

        .quick-link-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .snippets-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .snippets-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .snippets-header h3 {
            font-size: 18px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .snippet-input {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .snippet-input select,
        .snippet-input input {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-main);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .snippet-input select:focus,
        .snippet-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .snippet-input input {
            flex: 1;
        }

        .snippet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .snippet-item {
            background: var(--bg-main);
            border-radius: var(--radius-sm);
            padding: 16px;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }

        .snippet-item:hover {
            border-color: var(--primary);
        }

        .snippet-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .snippet-item-lang {
            font-size: 12px;
            padding: 3px 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            border-radius: 12px;
            font-weight: 500;
        }

        .snippet-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .snippet-item-code {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: "JetBrains Mono", Consolas, monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #1e293b;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            color: #e2e8f0;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #fef2f2;
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card .stat-number {
                font-size: 28px;
            }
        }

        .code-btn {
            padding: 6px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            height: fit-content;
        }

        .code-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                📚 编程<span>教程</span>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">首页</a>
                <a href="tutorial-hub.html" class="nav-item active">学习中心</a>
                <a href="tutorial-python.html" class="nav-item">Python</a>
                <a href="tutorial-java.html" class="nav-item">Java</a>
                <a href="tutorial-javascript.html" class="nav-item">JavaScript</a>
            </div>
        </div>
    </nav>

    <div class="hub-container">
        <div class="hub-header">
            <h1>学习中心</h1>
            <p>追踪你的学习进度，管理你的代码片段</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalCompleted">0</div>
                <div class="stat-label">已完成章节</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="languagesStudying">0</div>
                <div class="stat-label">正在学习语言</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="snippetCount">0</div>
                <div class="stat-label">代码片段</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="overallProgress">0%</div>
                <div class="stat-label">总体进度</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">学习进度</div>
            <div class="progress-list" id="progressList">
            </div>
        </div>

        <div class="section">
            <div class="section-title">快捷访问</div>
            <div class="quick-links">
                <a href="tutorial-python.html" class="quick-link">
                    <span class="quick-link-icon">🐍</span>
                    <span class="quick-link-text">Python教程</span>
                </a>
                <a href="tutorial-java.html" class="quick-link">
                    <span class="quick-link-icon">☕</span>
                    <span class="quick-link-text">Java教程</span>
                </a>
                <a href="tutorial-javascript.html" class="quick-link">
                    <span class="quick-link-icon">📜</span>
                    <span class="quick-link-text">JavaScript教程</span>
                </a>
                <a href="tutorial-cpp.html" class="quick-link">
                    <span class="quick-link-icon">⚙️</span>
                    <span class="quick-link-text">C/C++教程</span>
                </a>
                <a href="tutorial-csharp.html" class="quick-link">
                    <span class="quick-link-icon">🎯</span>
                    <span class="quick-link-text">C#教程</span>
                </a>
                <a href="tutorial-go.html" class="quick-link">
                    <span class="quick-link-icon">🐹</span>
                    <span class="quick-link-text">Go教程</span>
                </a>
                <a href="tutorial-php.html" class="quick-link">
                    <span class="quick-link-icon">🐘</span>
                    <span class="quick-link-text">PHP教程</span>
                </a>
                <a href="tutorial-rust.html" class="quick-link">
                    <span class="quick-link-icon">🦀</span>
                    <span class="quick-link-text">Rust教程</span>
                </a>
                <a href="tutorial-swift.html" class="quick-link">
                    <span class="quick-link-icon">🍎</span>
                    <span class="quick-link-text">Swift教程</span>
                </a>
                <a href="tutorial-typescript.html" class="quick-link">
                    <span class="quick-link-icon">📘</span>
                    <span class="quick-link-text">TypeScript教程</span>
                </a>
            </div>
        </div>

        <div class="section">
            <div class="snippets-section">
                <div class="snippets-header">
                    <h3>💾 我的代码片段</h3>
                    <button class="code-btn" onclick="exportSnippets()">导出全部</button>
                </div>
                <div class="snippet-input">
                    <select id="snippetLang">
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="javascript">JavaScript</option>
                        <option value="cpp">C++</option>
                        <option value="csharp">C#</option>
                        <option value="go">Go</option>
                        <option value="php">PHP</option>
                        <option value="rust">Rust</option>
                        <option value="swift">Swift</option>
                        <option value="typescript">TypeScript</option>
                    </select>
                    <input type="text" id="snippetTitle" placeholder="输入代码片段标题，按Enter保存">
                    <button class="code-btn" onclick="addSnippet()">添加</button>
                </div>
                <div class="snippet-list" id="snippetList">
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const languages = [
            { id: 'python', name: 'Python教程', icon: '🐍' },
            { id: 'java', name: 'Java教程', icon: '☕' },
            { id: 'javascript', name: 'JavaScript教程', icon: '📜' },
            { id: 'cpp', name: 'C/C++教程', icon: '⚙️' },
            { id: 'csharp', name: 'C#教程', icon: '🎯' },
            { id: 'go', name: 'Go教程', icon: '🐹' },
            { id: 'php', name: 'PHP教程', icon: '🐘' },
            { id: 'rust', name: 'Rust教程', icon: '🦀' },
            { id: 'swift', name: 'Swift教程', icon: '🍎' },
            { id: 'typescript', name: 'TypeScript教程', icon: '📘' }
        ];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function getProgress() {
            const dataKey = 'TUTORIAL_DATA_python';
            const totalChapters = window[dataKey] ? window[dataKey].length : 35;
            let totalCompleted = 0;
            let totalChaptersAll = 0;
            let studyingCount = 0;

            const list = document.getElementById('progressList');
            list.innerHTML = '';

            languages.forEach(lang => {
                const pKey = lang.id + '_progress';
                const progress = JSON.parse(localStorage.getItem(pKey) || '[]');
                const count = progress.length;
                const chapters = totalChapters;
                const percent = Math.round((count / chapters) * 100);

                if (count > 0) studyingCount++;
                totalCompleted += count;
                totalChaptersAll += chapters;

                const card = document.createElement('a');
                card.href = 'tutorial-' + lang.id + '.html';
                card.className = 'progress-card';
                card.innerHTML = `
                    <div class="progress-card-header">
                        <span class="progress-card-title">${lang.icon} ${lang.name}</span>
                        <span class="progress-card-percent">${percent}%</span>
                    </div>
                    <div class="progress-bar-hub">
                        <div class="progress-bar-hub-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="progress-info">
                        <span>已完成 ${count} 节</span>
                        <span>共 ${chapters} 节</span>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('totalCompleted').textContent = totalCompleted;
            document.getElementById('languagesStudying').textContent = studyingCount;
            document.getElementById('overallProgress').textContent = 
                Math.round((totalCompleted / totalChaptersAll) * 100) + '%';
        }

        function getSnippets() {
            return JSON.parse(localStorage.getItem('code_snippets') || '[]');
        }

        function saveSnippets(snippets) {
            localStorage.setItem('code_snippets', JSON.stringify(snippets));
        }

        function renderSnippets() {
            const list = document.getElementById('snippetList');
            const snippets = getSnippets();
            document.getElementById('snippetCount').textContent = snippets.length;

            if (snippets.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有代码片段，添加一个吧！</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            snippets.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'snippet-item';
                item.innerHTML = `
                    <div class="snippet-item-header">
                        <span class="snippet-item-lang">${s.language}</span>
                        <button class="delete-btn" onclick="deleteSnippet(${i})">✕</button>
                    </div>
                    <div class="snippet-item-title">${s.title}</div>
                    <div class="snippet-item-code">${s.code.substring(0, 60)}...</div>
                `;
                list.appendChild(item);
            });
        }

        function addSnippet() {
            const lang = document.getElementById('snippetLang').value;
            const title = document.getElementById('snippetTitle').value.trim();
            if (!title) {
                showToast('请输入代码片段标题');
                return;
            }
            const code = prompt('请输入代码内容：');
            if (!code) return;

            const snippets = getSnippets();
            snippets.unshift({ language: lang, title, code, date: new Date().toISOString() });
            saveSnippets(snippets);
            renderSnippets();
            document.getElementById('snippetTitle').value = '';
            showToast('代码片段已保存');
        }

        function deleteSnippet(index) {
            if (!confirm('确定删除此代码片段吗？')) return;
            const snippets = getSnippets();
            snippets.splice(index, 1);
            saveSnippets(snippets);
            renderSnippets();
            showToast('已删除');
        }

        function exportSnippets() {
            const snippets = getSnippets();
            if (snippets.length === 0) {
                showToast('没有代码片段可导出');
                return;
            }
            const blob = new Blob([JSON.stringify(snippets, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'code-snippets.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('导出成功');
        }

        document.getElementById('snippetTitle').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addSnippet();
        });

        function loadChaptersData() {
            let loaded = 0;
            languages.forEach((lang, index) => {
                const script = document.createElement('script');
                script.src = 'data/tutorial-' + lang.id + '.data.js';
                script.onload = function() {
                    loaded++;
                    if (loaded === languages.length) {
                        getProgress();
                    }
                };
                script.onerror = function() {
                    loaded++;
                    if (loaded === languages.length) {
                        getProgress();
                    }
                };
                document.head.appendChild(script);
            });
        }

        getProgress();
        renderSnippets();
        loadChaptersData();
    </script>
</body>
</html>
