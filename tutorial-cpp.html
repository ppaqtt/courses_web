        .progress-bar { background: var(--bg-secondary); height: 20px; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }

        .chapter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .chapter-title { font-size: 2rem; margin: 0; display: flex; align-items: center; gap: 15px; }

        .practice-question { margin-bottom: 20px; }

        .practice-input { width: 100%; padding: 12px 15px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-primary); color: var(--text-primary); font-family: monospace; font-size: 1rem; }
        .practice-btn { padding: 10px 25px; border: none; border-radius: 10px; background: var(--accent-color); color: white; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .practice-result { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; }
        .practice-result.correct { display: block; background: rgba(76,175,80,0.1); color: var(--success-color); border: 1px solid var(--success-color); }
        .practice-result.incorrect { display: block; background: rgba(244,67,54,0.1); color: var(--error-color); border: 1px solid var(--error-color); }
        .answer-box { background: rgba(76,175,80,0.1); border: 1px dashed var(--success-color); padding: 15px 20px; border-radius: 10px; margin-top: 15px; display: none; }
        .answer-box.show { display: block; }
        .notes-section { background: var(--bg-secondary); border-radius: 15px; padding: 25px; margin-top: 30px; }
        .notes-section h4 { margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; }
        .notes-textarea { width: 100%; min-height: 100px; padding: 15px; border: 2px solid var(--border-color); border-radius: 10px; background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 1rem; resize: vertical; }

        .footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.9rem; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }

        @media (max-width: 1000px) { .sidebar { position: static; width: auto; max-height: 300px; margin-bottom: 30px; } .main-content { margin-left: 0; } }

        string name; int id; double score;
        cin >> name >> id >> score;

        for (const auto& s : students) s.display();

    void statistics() const {
        if (students.empty()) return;
        double sum = 0;

        let currentChapter = 1;
        let favorites = JSON.parse(localStorage.getItem('cpp_favorites') || '[]');
        let completed = JSON.parse(localStorage.getItem('cpp_completed') || '[]');
        let notes = JSON.parse(localStorage.getItem('cpp_notes') || '{}');

        function init() {
            renderChapterList();
            renderChapterContent();
            updateProgress();
            loadNotes();
            applyTheme();
        }

        function renderChapterList() {
            const list = document.getElementById('chapterList');
            list.innerHTML = chapters.map(ch => `
                <li class="chapter-item ${completed.includes(ch.id) ? 'completed' : ''} ${currentChapter === ch.id ? 'active' : ''}" onclick="switchChapter(${ch.id})">
                    <span class="chapter-number">${ch.id}</span>
                    <span>${ch.title}</span>
                    ${completed.includes(ch.id) ? '✓' : ''}
                </li>
            `).join('');
        }

        function renderChapterContent() {
            const content = document.getElementById('mainContent');
            const chapter = chapters.find(c => c.id === currentChapter);
            content.innerHTML = `
                <div class="chapter active" id="ch${chapter.id}">
                    <div class="chapter-header">
                        <h2 class="chapter-title">
                            <span class="chapter-number" style="background: var(--accent-color); color: white;">${chapter.id}</span>
                            ${chapter.title}
                        </h2>
                        <div class="chapter-actions">
                            <button class="action-btn favorite ${favorites.includes(chapter.id) ? 'active' : ''}" onclick="toggleFavorite(${chapter.id})">
                                ⭐ ${favorites.includes(chapter.id) ? '已收藏' : '收藏'}
                            </button>
                            <button class="action-btn complete ${completed.includes(chapter.id) ? 'active' : ''}" onclick="toggleComplete(${chapter.id})">
                                ✅ ${completed.includes(chapter.id) ? '已完成' : '标记完成'}
                            </button>
                        </div>
                    </div>
                    ${chapter.content}
                    <div class="notes-section">
                        <h4>📝 我的笔记</h4>
                        <textarea class="notes-textarea" id="chapterNotes" placeholder="写下你的学习笔记...">${notes[chapter.id] || ''}</textarea>
                        <button class="notes-save-btn" onclick="saveNotes()">💾 保存笔记</button>
                    </div>
                    <div class="pagination">
                        <button class="pagination-btn" onclick="prevChapter()" ${currentChapter === 1 ? 'disabled' : ''}>← 上一章</button>
                        <button class="pagination-btn" onclick="nextChapter()" ${currentChapter === chapters.length ? 'disabled' : ''}>下一章 →</button>
                    </div>
                </div>
            `;
        }

        function switchChapter(id) {
            currentChapter = id;
            renderChapterList();
            renderChapterContent();
            loadNotes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevChapter() { if (currentChapter > 1) switchChapter(currentChapter - 1); }
        function nextChapter() { if (currentChapter < chapters.length) switchChapter(currentChapter + 1); }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if (idx === -1) favorites.push(id);
            else favorites.splice(idx, 1);
            localStorage.setItem('cpp_favorites', JSON.stringify(favorites));
            renderChapterContent();
        }

        function toggleComplete(id) {
            const idx = completed.indexOf(id);
            if (idx === -1) {
                completed.push(id);
                LearningStats.recordChapterCompletion('cpp', id);
            } else completed.splice(idx, 1);
            localStorage.setItem('cpp_completed', JSON.stringify(completed));
            renderChapterList();
            renderChapterContent();
            updateProgress();
        }

        function updateProgress() {
            const percent = Math.round((completed.length / chapters.length) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressBar').setAttribute('data-percentage', `${percent}%`);
            document.getElementById('progressText').textContent = `${completed.length}/${chapters.length} 章节`;
        }

        function saveNotes() {
            notes[currentChapter] = document.getElementById('chapterNotes').value;
            localStorage.setItem('cpp_notes', JSON.stringify(notes));
            alert('笔记已保存！');
        }

        function loadNotes() {
            const textarea = document.getElementById('chapterNotes');
            if (textarea && notes[currentChapter]) textarea.value = notes[currentChapter];
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                btn.textContent = '🌙 深色模式';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark-mode');
                btn.textContent = '☀️ 浅色模式';
                localStorage.setItem('theme', 'dark');
            }
        }

        function applyTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').textContent = '☀️ 浅色模式';
            }
        }

        function searchTutorial() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) { switchChapter(currentChapter); return; }
            const content = document.getElementById('mainContent');
            const results = chapters.filter(ch => ch.title.toLowerCase().includes(query) || ch.content.toLowerCase().includes(query));
            content.innerHTML = `
                <div class="chapter active"><h2>搜索结果: "${query}"</h2>
                    ${results.length > 0 ? results.map(ch => `<div class="search-result" onclick="switchChapter(${ch.id});document.getElementById('searchInput').value=''"><h3>第${ch.id}章：${ch.title}</h3></div>`).join('') : '<p>未找到相关内容</p>'}
                </div>
            `;
        }

        function checkAnswer(chapter, question) {
            const answers = {
                'ch1': ['main', 'main()'], 'ch2': ['double price', '%'], 'ch3': ['for', 'break'],
                'ch4': ['int arr[5]', 'length'], 'ch5': ['int sum', '递归终止'], 'ch6': ['int *ptr', '引用不能为空'],
                'ch7': ['class Circle', 'public'], 'ch8': ['多态', '抽象类'], 'ch9': ['vector', 'sort'],
                'ch10': ['sort', '封装']
            };
            const userAnswer = document.getElementById(`q${question}_${chapter}`).value.toLowerCase();
            const correct = answers[chapter][question - 1];
            const resultDiv = document.getElementById(`result_${chapter}_${question}`);
            if (userAnswer.includes(correct)) {
                resultDiv.textContent = '✅ 正确！';
                resultDiv.className = 'practice-result correct';
            } else {
                resultDiv.textContent = '❌ 错误，请重试';
                resultDiv.className = 'practice-result incorrect';
            }
        }

        function toggleAnswer(chapter, question) {
            document.getElementById(`answer_${chapter}_${question}`).classList.toggle('show');
        }

        function copyCode(btn) {
            const code = btn.parentElement.querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
